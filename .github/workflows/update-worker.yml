name: Auto Update Worker

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 1 * * *"  # 每天凌晨1点自动运行 (UTC)
  workflow_dispatch:
    inputs:
      force_latest:
        description: '强制更新到最新稳定版 (Latest)？（通常不需要）'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 获取当前本地版本
        id: get_local
        run: |
          if [ -f version.txt ]; then
            LOCAL_VERSION=$(cat version.txt | tr -d '[:space:]')
          else
            LOCAL_VERSION="none"
          fi
          echo "LOCAL_VERSION=$LOCAL_VERSION" >> $GITHUB_ENV
          echo "当前本地版本: $LOCAL_VERSION"

      - name: 获取上游最新版本信息
        id: fetch_releases
        run: |
          API_URL="https://api.github.com/repos/bia-pain-bache/BPB-Worker-Panel/releases"
          RESPONSE=$(curl -s -H "Accept: application/vnd.github.v3+json" "$API_URL")
          
          # 最新稳定版 (非 pre-release)
          LATEST_STABLE_TAG=$(echo "$RESPONSE" | jq -r '[ .[] | select(.prerelease==false) ] | .[0].tag_name')
          LATEST_STABLE_DL=$(echo "$RESPONSE" | jq -r --arg tag "$LATEST_STABLE_TAG" \
            '[ .[] | select(.tag_name==$tag) ] | .[0].assets[] | select(.name=="worker.zip").browser_download_url')
          
          # 最新 pre-release
          LATEST_PRE_TAG=$(echo "$RESPONSE" | jq -r '[ .[] | select(.prerelease==true) ] | .[0].tag_name // empty')
          LATEST_PRE_DL=$(echo "$RESPONSE" | jq -r --arg tag "$LATEST_PRE_TAG" \
            '[ .[] | select(.tag_name==$tag) ] | .[0].assets[] | select(.name=="worker.zip").browser_download_url // empty')
          
          echo "LATEST_STABLE_TAG=$LATEST_STABLE_TAG" >> $GITHUB_ENV
          echo "LATEST_STABLE_DL=$LATEST_STABLE_DL" >> $GITHUB_ENV
          echo "LATEST_PRE_TAG=$LATEST_PRE_TAG" >> $GITHUB_ENV
          echo "LATEST_PRE_DL=$LATEST_PRE_DL" >> $GITHUB_ENV
          
          echo "最新稳定版: $LATEST_STABLE_TAG"
          echo "最新 Pre-release: ${LATEST_PRE_TAG:-无}"

      - name: 判断是否需要更新
        id: decide
        run: |
          UPDATE_TARGET=""
          UPDATE_URL=""
          UPDATE_TYPE=""

          if [ "${{ env.LOCAL_VERSION }}" != "${{ env.LATEST_STABLE_TAG }}" ] && [ -n "${{ env.LATEST_STABLE_DL }}" ]; then
            UPDATE_TARGET="${{ env.LATEST_STABLE_TAG }}"
            UPDATE_URL="${{ env.LATEST_STABLE_DL }}"
            UPDATE_TYPE="stable"
          elif [ -n "${{ env.LATEST_PRE_TAG }}" ] && [ "${{ env.LOCAL_VERSION }}" != "${{ env.LATEST_PRE_TAG }}" ] && [ -n "${{ env.LATEST_PRE_DL }}" ]; then
            UPDATE_TARGET="${{ env.LATEST_PRE_TAG }}"
            UPDATE_URL="${{ env.LATEST_PRE_DL }}"
            UPDATE_TYPE="prerelease"
          fi

          if [ -n "$UPDATE_TARGET" ]; then
            echo "UPDATE_NEEDED=true" >> $GITHUB_ENV
            echo "UPDATE_TARGET=$UPDATE_TARGET" >> $GITHUB_ENV
            echo "UPDATE_URL=$UPDATE_URL" >> $GITHUB_ENV
            echo "UPDATE_TYPE=$UPDATE_TYPE" >> $GITHUB_ENV
            echo "需要更新到 $UPDATE_TYPE 版本: $UPDATE_TARGET"
          else
            echo "UPDATE_NEEDED=false" >> $GITHUB_ENV
            echo "已经是最新版本，无需更新"
          fi

      - name: 执行更新（自动或强制稳定版）
        if: env.UPDATE_NEEDED == 'true' || github.event.inputs.force_latest == 'true'
        run: |
          TARGET="${{ env.UPDATE_TARGET || env.LATEST_STABLE_TAG }}"
          URL="${{ env.UPDATE_URL || env.LATEST_STABLE_DL }}"
          TYPE="${{ env.UPDATE_TYPE || 'stable (forced)' }}"

          echo "开始更新到 $TYPE 版本: $TARGET"

          shopt -s extglob
          rm -rf !( .git | .github )

          wget -O worker.zip "$URL" || { echo "下载失败: $URL"; exit 1; }
          unzip -o worker.zip || { echo "解压失败"; exit 1; }
          rm -f worker.zip

          echo "$TARGET" > version.txt

          echo "更新完成，版本已写入 version.txt"

      - name: 自动提交更改
        if: env.UPDATE_NEEDED == 'true' || github.event.inputs.force_latest == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            🔄 自动更新 BPB Worker 到 ${{ env.UPDATE_TARGET || env.LATEST_STABLE_TAG }} 
            (${{ env.UPDATE_TYPE || 'stable (manual force)' }})
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          push_options: --force
